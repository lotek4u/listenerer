{{- $maxCount := include "maxCount" . -}}
{{- $fullName := include "fullName" . -}}
{{- $namespace := include "namespace" . -}}
{{- $publicIp := include "publicIP" . -}}
{{- range $i, $e := until (int $maxCount) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-external
  namespace: {{ $namespace }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  loadBalancerIP: {{ $publicIp }}
  ports:
  - name: {{ $.Values.public.media | add $i }}-tcp
    port: {{ $.Values.public.media | add $i }}
    targetPort: {{ $.Values.internal.media }}
    protocol: TCP
  selector:
    app: {{ $fullName }}
    statefulset.kubernetes.io/pod-name: {{ $fullName }}-{{ $i }}
{{- end }}